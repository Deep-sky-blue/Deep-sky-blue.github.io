            <h2 id="什么是navigator对象"><a href="#什么是navigator对象" class="headerlink" title="什么是navigator对象"></a>什么是navigator对象</h2><ul>
<li>navigator是一个独立的对象，他用于提供用户所使用的浏览器以及操作系统等信息，以navigator对象属性的形式来提供</li>
</ul>
<h2 id="浏览器中的navigitor对象"><a href="#浏览器中的navigitor对象" class="headerlink" title="浏览器中的navigitor对象"></a>浏览器中的navigitor对象</h2><p><img src="foldername/index.png" alt="浏览器中的navigitor对象"></p>
<h2 id="navigigator有那些属性"><a href="#navigigator有那些属性" class="headerlink" title="navigigator有那些属性"></a>navigigator有那些属性</h2><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br></pre></td><td class="code"><pre><span class="line">&lt;!doctype html&gt;</span><br><span class="line">&lt;html&gt;</span><br><span class="line">&lt;head&gt;</span><br><span class="line">    &lt;meta charset&#x3D;&quot;UTF-8&quot;&gt;</span><br><span class="line">    &lt;title&gt;Navigator详解,IE11，chrome和firefox浏览器下&lt;&#x2F;title&gt;</span><br><span class="line">    &lt;script&gt;</span><br><span class="line">       &#x2F;&#x2F;属性</span><br><span class="line">       var appCodeName&#x3D; window.navigator.appCodeName;&#x2F;&#x2F;返回与浏览器相关的内部代码名  都为Mozilla</span><br><span class="line">       var appName&#x3D;navigator.appName;&#x2F;&#x2F;返回浏览器正式名称  均为Netscape</span><br><span class="line">       var appVersion&#x3D;navigator.appVersion;&#x2F;&#x2F;返回浏览器版本号</span><br><span class="line">       var cookieEnabled&#x3D;navigator.cookieEnabled;&#x2F;&#x2F;返回浏览器是否启用cookie，true和false</span><br><span class="line">       var geolocation&#x3D;navigator.geolocation;&#x2F;&#x2F;返回地理定位信息(h5)</span><br><span class="line">       var javaEnabled&#x3D;navigator.javaEnabled();&#x2F;&#x2F;检测当前浏览器是否支持 Java，从而知道浏览器是否能显示 Java 小程序(IE,chrome返回true，firefox返回false)</span><br><span class="line">       var language&#x3D;navigator.language;&#x2F;&#x2F;返回浏览器的首选语言</span><br><span class="line">       var mimeTypes&#x3D; navigator.mimeTypes;&#x2F;&#x2F;返回浏览器支持的Mime类型</span><br><span class="line">       var msManipulationViewsEnabled&#x3D; navigator.msManipulationViewsEnabled;&#x2F;&#x2F;仅支持IE，true</span><br><span class="line">       var msMaxTouchPoints&#x3D;navigator.msMaxTouchPoints;&#x2F;&#x2F;字面意思是最大的触摸点，IE为0，其他不支持</span><br><span class="line">       var msPointerEnabled&#x3D;navigator.msPointerEnabled;&#x2F;&#x2F;IE为true，其他不支持</span><br><span class="line">       var onLine&#x3D;navigator.onLine;&#x2F;&#x2F;是否连接互联网，均返回true(未断网)</span><br><span class="line">       var platform&#x3D;navigator.platform;&#x2F;&#x2F;所在平台，返回win32</span><br><span class="line">       var plugins&#x3D;navigator.plugins;&#x2F;&#x2F;返回浏览器插件集合</span><br><span class="line">       var preference&#x3D;navigator.preference;&#x2F;&#x2F;允许一个已标识的脚本获取并设置特定的 Navigator 参数</span><br><span class="line">       var product&#x3D; navigator.product;&#x2F;&#x2F;浏览器产品名，返回gecko</span><br><span class="line">       var systemLanguage&#x3D;navigator.systemLanguage;&#x2F;&#x2F;获取系统语言，IE支持，返回zh-cn</span><br><span class="line">       var userAgent&#x3D;navigator.userAgent;&#x2F;&#x2F;判断浏览器类型</span><br><span class="line">       var userLanguage&#x3D;navigator.userLanguage;&#x2F;&#x2F;返回操作系统的自然语言设置,IE支持，返回zh-cn</span><br><span class="line">       &#x2F;&#x2F;方法</span><br><span class="line">       var msLaunchUri&#x3D;navigator.msLaunchUri;&#x2F;&#x2F;回调函数，未研究</span><br><span class="line">       var taintEnabled&#x3D;navigator.taintEnabled;&#x2F;&#x2F;回调函数</span><br><span class="line">       var hasOwnProperty&#x3D;navigator.hasOwnProperty;&#x2F;&#x2F;意思是是否支持属性，用法如下</span><br><span class="line">       var s&#x3D;document.hasOwnProperty(&quot;ontouchstart&quot;);&#x2F;&#x2F;电脑返回false，手机为true</span><br><span class="line">       </span><br><span class="line">       alert(s);</span><br><span class="line">    &lt;&#x2F;script&gt;</span><br><span class="line">&lt;&#x2F;head&gt;</span><br><span class="line">&lt;body&gt;</span><br><span class="line"> </span><br><span class="line">&lt;&#x2F;body&gt;</span><br><span class="line">&lt;&#x2F;html&gt;</span><br></pre></td></tr></table></figure>
